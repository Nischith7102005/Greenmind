le:"Actionable Recommendations",desc:"When to vent, irrigate, or shade — tailored for Indian growing conditions.",image:"https://images.pexels.com/photos/2886932/pexels-photo-2886932.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",color:"#7a5c3e",accent:"#a07d56",zIndex:4},{id:"card-3",tag:"Predictive Guard",title:"Future Problem Detection",desc:"Catches pest outbreaks, nutrient deficiencies, and heat stress before they hit.",image:"https://images.pexels.com/photos/16678080/pexels-photo-16678080.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=627&w=1200",color:"#0e6655",accent:"#17a589",zIndex:3},{id:"card-4",tag:"AI Companion",title:"Your Greenhouse Assistant",desc:"An AI that understands your crops, climate, and greenhouse — all offline.",image:"/images/outro-field.jpg",color:"#5c3317",accent:"#8b5e3c",zIndex:2}],Mm={privacy:{title:"Privacy Policy",sections:[{heading:"1. Overview",body:'GreenMind ("we", "us", or "our") respects your privacy and is committed to protecting your personal data. This Privacy Policy explains how we collect, use, and safeguard your information when you use the GreenMind application and related services.'},{heading:"2. Data We Collect",body:`GreenMind is designed to operate entirely offline. The data we collect is limited to:

• Sensor Data: Environmental readings (temperature, humidity, soil moisture, light levels, CO₂) collected from your greenhouse microcontroller via USB connection.
• Usage Data: How you interact with the application, including features used and session duration. This data is stored locally on your device.
• Device Information: Basic device identifiers and operating system version for compatibility purposes.

We do not collect your name, email address, phone number, or any other personally identifiable information unless you voluntarily provide it through our contact or support channels.`},{heading:"3. How We Use Your Data",body:`• To provide and improve the GreenMind decision-support system.
• To generate AI-powered recommendations and predictive insights for your greenhouse.
• To maintain historical environmental records for trend analysis.
• To improve application performance and user experience.
• To respond to support requests when you contact us.`},{heading:"4. Data Storage & Security",body:`All sensor data and AI processing occurs locally on your device. No data is transmitted to external servers during normal operation. When connected via USB, data flows only between your microcontroller and the GreenMind application.

We implement reasonable technical measures to protect your data, including local encryption where applicable. However, no system is completely secure, and we cannot guarantee absolute security.`},{heading:"5. Data Sharing",body:"We do not sell, rent, or share your personal data with third parties for marketing purposes. We may share anonymized, aggregated data for research or product improvement purposes only when it cannot be used to identify you individually."},{heading:"6. Your Rights",body:`You have the right to:
• Access all data stored within the application on your device.
• Delete your data at any time by clearing the application data or uninstalling the app.
• Export your historical data for personal records.
• Opt out of any optional data collection features.

Since GreenMind operates offline and stores data locally, you maintain full control over your information at all times.`},{heading:"7. Children's Privacy",body:"GreenMind is not directed at children under the age of 13. We do not knowingly collect personal information from children."},{heading:"8. Changes to This Policy",body:"We may update this Privacy Policy from time to time. Any changes will be reflected within the application and on our website. Continued use of GreenMind after changes constitutes acceptance of the updated policy."},{heading:"9. Contact",body:"If you have questions about this Privacy Policy or your data, please contact us at privacy@greenmind.in."}]},terms:{title:"Terms of Service",sections:[{heading:"1. Acceptance of Terms",body:'By downloading, installing, or using GreenMind ("the Application"), you agree to be bound by these Terms of Service. If you do not agree with any part of these terms, you must not use the Application.'},{heading:"2. Description of Service",body:"GreenMind is an AI-powered offline greenhouse decision support system that connects to your greenhouse microcontroller via USB. It provides environmental monitoring, actionable recommendations, predictive analytics, and an AI assistant — all operating locally on your device without requiring an internet connection."},{heading:"3. Acceptable Use",body:`You agree to use GreenMind only for its intended purpose: supporting greenhouse management decisions. You must not:

• Use the Application for any unlawful purpose.
• Attempt to reverse-engineer, decompile, or disassemble the Application.
• Modify, adapt, or create derivative works of the Application.
• Use the Application in any way that could damage, disable, or impair its operation.
• Remove or alter any proprietary notices within the Application.`},{heading:"4. User Responsibilities",body:`You are solely responsible for:
• Ensuring your greenhouse microcontroller is compatible with GreenMind's USB connection requirements.
• Maintaining the physical safety and regulatory compliance of your greenhouse operations.
• Making final decisions regarding your crops, treatments, and greenhouse management. GreenMind provides decision support — not definitive instructions.
• Backing up any data you wish to preserve.`},{heading:"5. Intellectual Property",body:"GreenMind and all its contents, features, and functionality — including but not limited to text, graphics, logos, icons, images, audio clips, software, and their compilation — are the exclusive property of GreenMind and are protected by international copyright, trademark, and other intellectual property laws."},{heading:"6. Limitation of Liability",body:`GreenMind provides AI-generated recommendations and predictions for decision-support purposes only. We do not guarantee the accuracy, completeness, or reliability of any recommendations or predictions.

To the maximum extent permitted by applicable law, GreenMind shall not be liable for any indirect, incidental, special, consequential, or punitive damages, including but not limited to crop loss, reduced yield, pest damage, equipment damage, or financial loss arising from your use of or reliance on the Application.

You acknowledge that agricultural decisions involve inherent risks and that GreenMind is a support tool, not a substitute for professional agricultural advice.`},{heading:"7. Disclaimer of Warranties",body:'The Application is provided "as is" and "as available" without warranties of any kind, either express or implied. We do not warrant that the Application will be uninterrupted, error-free, or free of harmful components.'},{heading:"8. Termination",body:"We reserve the right to discontinue the Application at any time. You may stop using the Application at any time by uninstalling it from your device. Upon uninstallation, all locally stored data will be permanently deleted."},{heading:"9. Governing Law",body:"These Terms shall be governed by and construed in accordance with the laws of India, without regard to its conflict of law provisions. Any disputes arising from these Terms or the use of the Application shall be resolved in the courts of India."},{heading:"10. Changes to Terms",body:"We reserve the right to modify these Terms at any time. Changes will be effective upon posting within the Application or on our website. Your continued use of the Application after any changes constitutes acceptance of the new Terms."}]},cookies:{title:"Cookie Policy",sections:[{heading:"1. What Are Cookies",body:"Cookies are small text files stored on your device when you visit a website or use a web-based application. They help the application remember your preferences and improve your experience."},{heading:"2. How GreenMind Uses Cookies",body:`Since GreenMind is primarily an offline desktop application, our use of cookies is minimal and limited to:

• Essential Cookies: Required for the application to function properly, including session management and security features.
• Preference Cookies: Remember your settings and preferences within the application interface.

We do not use advertising cookies, tracking cookies, or third-party analytics cookies.`},{heading:"3. Third-Party Services",body:"If GreenMind integrates with any web-based services (such as our website or support portal), those services may set their own cookies. We encourage you to review the cookie policies of any third-party services you access through GreenMind."},{heading:"4. Managing Cookies",body:"You can control and manage cookies through your browser or device settings. Most browsers allow you to refuse cookies or delete existing cookies. Note that disabling essential cookies may affect the functionality of the application."},{heading:"5. Updates",body:"We may update this Cookie Policy from time to time. Any changes will be reflected within the application."},{heading:"6. Contact",body:"For questions about our use of cookies, contact us at privacy@greenmind.in."}]},disclaimer:{title:"Disclaimer",sections:[{heading:"Decision-Support Only",body:"GreenMind is a decision-support tool designed to assist greenhouse owners in interpreting environmental data and making informed choices. The recommendations, predictions, and insights provided by the Application are generated by AI models and should not be considered as definitive agricultural, scientific, or professional advice."},{heading:"No Guarantee of Results",body:"Agricultural outcomes depend on numerous factors beyond the scope of any software application, including but not limited to weather variability, soil conditions, pest behavior, seed quality, and human judgment. GreenMind does not guarantee specific yields, pest prevention, crop health, or financial outcomes."},{heading:"User Responsibility",body:`You remain solely responsible for all decisions made in connection with your greenhouse operations. This includes but is not limited to:

• Irrigation schedules and water management.
• Ventilation, shading, and temperature control actions.
• Pest and disease treatment decisions.
• Fertilizer and nutrient application.
• Crop selection and planting decisions.

Always consult with a qualified agricultural professional when making critical decisions about your crops and greenhouse operations.`},{heading:"AI Limitations",body:"The AI models used in GreenMind are trained on available agricultural data and may not account for all local conditions, crop varieties, or environmental factors. Predictions and recommendations may be inaccurate, incomplete, or inappropriate for your specific situation. The AI companion feature provides general guidance and should not be relied upon as a sole source of information."},{heading:"Hardware Compatibility",body:"GreenMind connects to greenhouse microcontrollers via USB. We do not manufacture or guarantee the performance of any microcontroller, sensor, or hardware device. Compatibility issues, sensor malfunctions, or hardware failures are beyond our control and are not the responsibility of GreenMind."},{heading:"Force Majeure",body:"GreenMind shall not be held liable for any failure or delay in performance due to circumstances beyond its reasonable control, including natural disasters, power outages, equipment failures, or any other events that prevent the Application from functioning as intended."},{heading:"Contact",body:"For questions about this Disclaimer, contact us at legal@greenmind.in."}]}};function H4(){const[n,e]=Ae.useState(null),[i,a]=Ae.useState("landing"),{deviceState:l}=ly();Ae.useEffect(()=>$a?Q2($a,f=>{const h=n;e(f),f?h||a("connect"):a("landing")}):void 0,[n]);const o=Ae.useCallback(()=>{n&&a(l.connected?"dashboard":"connect")},[n,l.connected]);return i==="auth"&&!n?C.jsx(iM,{onBack:()=>a("landing")}):i==="connect"&&n?C.jsx(cM,{onBack:()=>a("landing"),onNavigate:u=>a(u)}):i==="dashboard"&&n?C.jsx(B4,{onNavigate:u=>a(u)}):C.jsx(q4,{onGetStarted:()=>a("auth"),user:n,onOpenDashboard:o})}function F4(){return C.jsx(uM,{children:C.jsx(H4,{})})}function q4({onGetStarted:n,user:e,onOpenDashboard:i}){const a=Ae.useRef(null),l=Ae.useRef(null),o=Ae.useRef(null),u=Ae.useRef(null),f=Ae
